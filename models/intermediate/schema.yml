version: 2

models:
    - name: int_orders
      columns:
          - name: order_id
            description: "The primary key for this table"
            tests:
                - unique
                - not_null
                
    - name: int_orders_detail
      columns:
          - name: order_id
            description: "define unique order"
            tests:
                - not_null
          - name: product_id
            description: "define what product customer buy in a order, order_id + product_id is unique key"
            tests:
                - not_null

    - name: int_dim_customer
      columns:
          - name: customer_id
            description: "The primary key for this table"
            tests:
                - unique
                - not_null

    - name: int_dim_product
      columns:
          - name: product_id
            description: "The primary key for this table"
            tests:
                - unique
                - not_null

    
     