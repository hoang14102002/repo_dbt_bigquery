version: 2

sources:
  - name: raw
    database: global-sale-project-493507
    schema: raw_data
    tables:
      - name: sales_raw_data

models:
  - name: stg_orders
    description: "Staging table for orders"
    columns:
      - name: row_id
        description: "Unique identifier for each row"
        tests:
          - not_null
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - not_null
      - name: order_date
        description: "Date when order was placed"
      - name: ship_date
        description: "Date when order was shipped"
      - name: ship_mode
        description: "Shipping mode used for delivery"
      - name: customer_id
        description: "Unique identifier for customer"
      - name: customer_name
        description: "Name of the customer"
      - name: segment
        description: "Customer segment"
      - name: postal_code
        description: "Postal code of delivery address"
      - name: city
        description: "City of delivery"
      - name: state
        description: "State of delivery"
      - name: country
        description: "Country of delivery"
      - name: region
        description: "Region of delivery"
      - name: market
        description: "Market classification"
      - name: product_id
        description: "Unique identifier for product"
      - name: category
        description: "Product category"
      - name: sub_category
        description: "Product sub-category"
      - name: product_name
        description: "Name of the product"
      - name: sales
        description: "Total sales amount"
      - name: quantity
        description: "Number of items ordered"
      - name: discount
        description: "Discount rate applied"
      - name: profit
        description: "Profit from the order"
      - name: shipping_cost
        description: "Cost of shipping"
      - name: order_priority
        description: "Priority level of the order"